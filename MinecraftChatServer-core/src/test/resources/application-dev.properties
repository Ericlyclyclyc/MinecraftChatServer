# 챈쨉혢챔짱혮챌혦짱책짖혘챕혚혥챌쩍짰 - 채쩍쩔챌혬짢 H2 책혛혚책짯혱챈혮째챈혥짰책쨘혫

# 챈혵혥책혡징책혲짢챌짬짱책혧짙
server.port=0

# WebSocket챕혚혥챌쩍짰
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# 챈혮째챈혥짰책쨘혫챕혚혥챌쩍짰 (H2 책혛혚책짯혱챈혮째챈혥짰책쨘혫챦쩌혣챈쨉혢챔짱혮챌혬짢)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate 챕혚혥챌쩍짰
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 챌짝혖챌혬짢 JDBC Session
spring.session.store-type=none

# 챈혰짜책쩔혰챕혚혥챌쩍짰
logging.level.org.lyc122.dev.minecraftchatserver=DEBUG
logging.level.org.springframework.web.socket=INFO

# 챔쩔혷챈혦짜챌짰징챌혨혛챕혚혥챌쩍짰
chat.default-radius=100.0
