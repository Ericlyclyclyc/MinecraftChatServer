spring.application.name=MinecraftChatServer

# 服务器端口
server.port=8080

# WebSocket配置
# 最大消息大小(字节)
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# 数据库配置 (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/minecraft_chat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate 配置
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 连接池配置
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# 禁用 JDBC Session（使用内存Session）
spring.session.store-type=none

# 日志配置
logging.level.org.lyc122.dev.minecraftchatserver=DEBUG
logging.level.org.springframework.web.socket=INFO

# 连接管理配置
# 默认区域传播半径(用于参考)
chat.default-radius=100.0
