# 开发环境配置 - 使用 H2 内存数据库（无需 MySQL）

# 服务器端口
server.port=8080

# WebSocket配置
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# 数据库配置 (H2 内存数据库，开发测试用)
spring.datasource.url=jdbc:h2:mem:chatserverdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate 配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (开发调试用)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 禁用 JDBC Session
spring.session.store-type=none

# 日志配置
logging.level.org.lyc122.dev.minecraftchatserver=DEBUG
logging.level.org.springframework.web.socket=INFO

# 连接管理配置
chat.default-radius=100.0
