# Production Configuration
server.port=8081

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/minecraft_chat_web?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration
spring.thymeleaf.cache=true

# Session Configuration
server.servlet.session.timeout=24h

# Chat Server Configuration
chat.server.name=WebClient
chat.session.timeout=1440

# Router WebSocket Configuration
router.websocket.url=ws://localhost:8080/ws/minecraft-chat

# Logging
logging.level.org.lyc122.dev.minecraftchatclient.web=WARN
logging.level.org.springframework.web.socket=WARN
