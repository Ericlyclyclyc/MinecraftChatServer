# Server Configuration
server.port=8081

# Application Name
spring.application.name=MinecraftChatClient-web

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:file:./data/chatclient-web
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Session Configuration
server.servlet.session.timeout=24h

# Chat Server Configuration
chat.server.name=WebClient
chat.session.timeout=1440

# Router WebSocket Configuration
router.websocket.url=ws://localhost:8080/ws/minecraft-chat

# Logging
logging.level.org.lyc122.dev.minecraftchatclient.web=INFO
logging.level.org.springframework.web.socket=INFO
