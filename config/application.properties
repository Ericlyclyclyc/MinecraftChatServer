# 脙聝脗娄脙聜脗聲脙聜脗掳脙聝脗娄脙聜脗聧脙聜脗庐脙聝脗楼脙聜脗潞脙聜脗聯脙聝脗漏脙聜脗聟脙聜脗聧脙聝脗搂脙聜脗陆脙聜脗庐 (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/minecraft_chat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Eric120513
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate 脙聝脗漏脙聜脗聟脙聜脗聧脙聝脗搂脙聜脗陆脙聜脗庐
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ddl-auto 莽聰卤 ExternalConfigLoader 氓聤篓忙聙聛忙聨搂氓聢露茂录職
# - 茅娄聳忙卢隆猫驴聬猫隆聦: create (猫聡陋氓聤篓氓聢聸氓禄潞猫隆篓)
# - 氓聬聨莽禄颅猫驴聬猫隆聦: validate (盲禄聟茅陋聦猫炉聛猫隆篓莽禄聯忙聻聞)
spring.jpa.hibernate.ddl-auto=${chatserver.ddl-auto:validate}
spring.jpa.show-sql=true

# 脙聝脗篓脙聜脗驴脙聜脗聻脙聝脗娄脙聜脗聨脙聜脗楼脙聝脗娄脙聜脗卤脙聜脗聽脙聝脗漏脙聜脗聟脙聜脗聧脙聝脗搂脙聜脗陆脙聜脗庐
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# 脙聝脗搂脙聜脗娄脙聜脗聛脙聝脗搂脙聜脗聰脙聜脗篓 JDBC Session脙聝脗炉脙聜脗录脙聜脗聢脙聝脗陇脙聜脗陆脙聜脗驴脙聝脗搂脙聜脗聰脙聜脗篓脙聝脗楼脙聜脗聠脙聜脗聟脙聝脗楼脙聜脗颅脙聜脗聵Session脙聝脗炉脙聜脗录脙聜脗聣
spring.session.store-type=none

# 脙聝脗娄脙聜脗聴脙聜脗楼脙聝脗楼脙聜脗驴脙聜脗聴脙聝脗漏脙聜脗聟脙聜脗聧脙聝脗搂脙聜脗陆脙聜脗庐
