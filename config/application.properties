spring.application.name=MinecraftChatServer

# 脙聝脗娄脙聜脗聹脙聜脗聧脙聝脗楼脙聜脗聤脙聜脗隆脙聝脗楼脙聜脗聶脙聜脗篓脙聝脗搂脙聜脗芦脙聜脗炉脙聝脗楼脙聜脗聫脙聜脗拢
server.port=8080

# WebSocket脙聝脗漏脙聜脗聟脙聜脗聧脙聝脗搂脙聜脗陆脙聜脗庐
# 脙聝脗娄脙聜脗聹脙聜脗聙脙聝脗楼脙聜脗陇脙聜脗搂脙聝脗娄脙聜脗露脙聜脗聢脙聝脗娄脙聜脗聛脙聜脗炉脙聝脗楼脙聜脗陇脙聜脗搂脙聝脗楼脙聜脗掳脙聜脗聫(脙聝脗楼脙聜脗颅脙聜脗聴脙聝脗篓脙聜脗聤脙聜脗聜)
spring.websocket.max-text-message-size=65536
