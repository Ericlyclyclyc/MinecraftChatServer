# 氓录聙氓聫聭莽聨炉氓垄聝茅聟聧莽陆庐 - 盲陆驴莽聰篓 H2 氓聠聟氓颅聵忙聲掳忙聧庐氓潞聯茂录聢忙聴聽茅聹聙 MySQL茂录聣

# 忙聹聧氓聤隆氓聶篓莽芦炉氓聫拢
server.port=8080

# WebSocket茅聟聧莽陆庐
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# 忙聲掳忙聧庐氓潞聯茅聟聧莽陆庐 (H2 氓聠聟氓颅聵忙聲掳忙聧庐氓潞聯茂录聦氓录聙氓聫聭忙碌聥猫炉聲莽聰篓)
spring.datasource.url=jdbc:h2:mem:chatserverdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate 茅聟聧莽陆庐
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# ddl-auto 莽聰卤 ExternalConfigLoader 氓聤篓忙聙聛忙聨搂氓聢露
spring.jpa.hibernate.ddl-auto=${chatserver.ddl-auto:create-drop}
spring.jpa.show-sql=true

# H2 Console (氓录聙氓聫聭猫掳聝猫炉聲莽聰篓)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 莽娄聛莽聰篓 JDBC Session
spring.session.store-type=none

# 忙聴楼氓驴聴茅聟聧莽陆庐
logging.level.org.lyc122.dev.minecraftchatserver=DEBUG
logging.level.org.springframework.web.socket=INFO

# 猫驴聻忙聨楼莽庐隆莽聬聠茅聟聧莽陆庐
chat.default-radius=100.0
