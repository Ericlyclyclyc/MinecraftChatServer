name: ChatServerClient
description: A Lightweight Chat Server Client with Folia Support
prefix: ChatBridgeClient
version: @project.version@

main: org.lyc122.dev.mc.chatServerClient.ChatServerClient
api-version: '1.21'
load: STARTUP
folia-supported: true

authors: [lyc122]

commands:
  chat:
    description: 切换聊天模式
    usage: /chat <local|broadcast|unicast|multicast|group> [目标]
    permission: chatserverclient.chat
    permission-message: §c你没有权限使用此命令
  chatserver:
    description: ChatServer 管理命令
    usage: /chatserver <reconnect|status>
    permission: chatserverclient.admin
    permission-message: §c你没有权限使用此命令

permissions:
  chatserverclient.chat:
    description: 允许使用聊天模式切换命令
    default: true
  chatserverclient.admin:
    description: 允许使用管理命令
    default: op
